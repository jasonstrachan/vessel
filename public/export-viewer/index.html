<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TinyBrush WebGL Bundle Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        cursor: default;
        user-select: none;
      }
      canvas {
        display: block;
        background: #000;
        image-rendering: pixelated;
      }
      #viewer-status {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(12, 17, 24, 0.7);
        color: #fff;
        font: 500 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        letter-spacing: 0.01em;
        text-align: center;
        pointer-events: none;
        transition: opacity 160ms ease;
        opacity: 0;
        max-width: min(90vw, 480px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      #viewer-status[data-visible='true'] {
        opacity: 1;
      }
      #viewer-status[data-level='error'] {
        color: #ff8686;
      }
    </style>
  </head>
  <body>
    <canvas id="preview-canvas" aria-hidden="true"></canvas>
    <input id="file-input" type="file" accept="application/json" hidden />

    <script type="module">
      import { renderTinyBrushWebGL } from './viewer.js';

      const canvas = document.getElementById('preview-canvas');
      const fileInput = document.getElementById('file-input');
      let isRendering = false;
      let pendingMetadata = null;
      let lastMetadata = null;

      const statusElement = (() => {
        const element = document.createElement('div');
        element.id = 'viewer-status';
        element.setAttribute('role', 'status');
        element.dataset.visible = 'false';
        element.dataset.level = 'info';
        document.body.appendChild(element);
        return element;
      })();

      const setStatus = (message, level = 'info') => {
        const text = typeof message === 'string' ? message.trim() : '';
        const severity = level === 'error' ? 'error' : 'info';
        statusElement.dataset.level = severity;
        if (text) {
          statusElement.textContent = text;
          statusElement.dataset.visible = 'true';
          if (severity === 'error') {
            console.error('[TinyBrush Viewer]', text);
          }
        } else {
          statusElement.textContent = '';
          statusElement.dataset.visible = 'false';
        }
      };

      const summarizeMetadata = () => {};

      const computeScale = (metadata) => {
        const { width, height } = metadata.viewport ?? {};
        if (!width || !height) {
          return 1;
        }
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const scale = Math.min(viewportWidth / width, viewportHeight / height, 1);
        return scale > 0 ? scale : 1;
      };

      const drawMetadata = async (metadata) => {
        if (!metadata) {
          return;
        }
        pendingMetadata = metadata;
        if (isRendering) {
          return;
        }
        isRendering = true;
        while (pendingMetadata) {
          const current = pendingMetadata;
          pendingMetadata = null;
          try {
            const scale = computeScale(current);
            await renderTinyBrushWebGL(current, canvas, { scale });
            lastMetadata = current;
          } catch (error) {
            console.error('Failed to render TinyBrush bundle', error);
            break;
          }
        }
        isRendering = false;
      };

      const renderBundle = async (file) => {
        if (!file) {
          return;
        }
        try {
          const text = await file.text();
          const metadata = JSON.parse(text);
          void drawMetadata(metadata);
        } catch (error) {
          console.error('Failed to load TinyBrush bundle', error);
        }
      };

      const handleFileSelection = (event) => {
        const file = event?.target?.files?.[0];
        if (file) {
          void renderBundle(file);
        }
        if (event?.target) {
          event.target.value = '';
        }
      };

      fileInput.addEventListener('change', handleFileSelection);

      window.addEventListener('dragover', (event) => {
        event.preventDefault();
      });

      window.addEventListener('drop', (event) => {
        event.preventDefault();
        const file = event.dataTransfer?.files?.[0];
        if (file) {
          void renderBundle(file);
        }
      });

      window.addEventListener('keydown', (event) => {
        const isOpenShortcut = (event.key === 'o' || event.key === 'O') && (event.metaKey || event.ctrlKey);
        if (isOpenShortcut) {
          event.preventDefault();
          fileInput.click();
        }
      });

      window.addEventListener('resize', () => {
        // Re-render with updated scale when viewport changes.
        if (lastMetadata) {
          void drawMetadata(lastMetadata);
        }
      });

      const readyMessage = 'Viewer ready. Drop a bundle or use Ctrl/Cmd+O to open a file.';
      setStatus(readyMessage);
    </script>
  </body>
</html>
