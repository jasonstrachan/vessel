<!DOCTYPE html>
<html>
<head>
    <title>Grid Snap Test</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'IBM Plex Mono', 'Courier New', monospace; }
        canvas { border: 1px solid #ccc; display: block; margin: 20px 0; }
        .controls { margin: 10px 0; }
        button { margin: 5px; padding: 5px 10px; }
    </style>
</head>
<body>
    <h2>Grid Snap Test - Verify No Diagonal Connections</h2>
    <div class="controls">
        <button onclick="toggleGridSnap()">Toggle Grid Snap: <span id="gridStatus">ON</span></button>
        <button onclick="clearCanvas()">Clear</button>
    </div>
    <canvas id="testCanvas" width="600" height="400"></canvas>
    <div>Click and drag fast to test. With grid snap ON, stamps should NOT connect diagonally.</div>

    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let gridSnap = true;
        let lastPos = null;
        const GRID_SIZE = 20;

        // Draw grid
        function drawGrid() {
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function snapToGrid(x, y) {
            if (!gridSnap) return { x, y };
            return {
                x: Math.round(x / GRID_SIZE) * GRID_SIZE,
                y: Math.round(y / GRID_SIZE) * GRID_SIZE
            };
        }

        function drawStamp(x, y) {
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const pos = snapToGrid(e.clientX - rect.left, e.clientY - rect.top);
            drawStamp(pos.x, pos.y);
            lastPos = pos;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const pos = snapToGrid(e.clientX - rect.left, e.clientY - rect.top);
            
            // Only draw if position changed (important for grid snap)
            if (lastPos && (pos.x !== lastPos.x || pos.y !== lastPos.y)) {
                // With grid snap, just draw stamp at new position
                // WITHOUT connecting to previous position
                drawStamp(pos.x, pos.y);
                lastPos = pos;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            lastPos = null;
        });

        function toggleGridSnap() {
            gridSnap = !gridSnap;
            document.getElementById('gridStatus').textContent = gridSnap ? 'ON' : 'OFF';
            clearCanvas();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gridSnap) drawGrid();
        }

        // Initial draw
        clearCanvas();
    </script>
</body>
</html>
