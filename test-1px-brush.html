<!DOCTYPE html>
<html>
<head>
    <title>1px Brush Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>
<body>
    <h1>1px Brush Test</h1>
    <p>Test different 1px drawing methods</p>
    <div id="canvas-container"></div>

    <script>
        function setup() {
            let canvas = createCanvas(800, 600);
            canvas.parent('canvas-container');
            
            pixelDensity(1);
            noSmooth();
            background(255);
            
            // Set canvas CSS for pixel perfect
            canvas.canvas.style.imageRendering = 'pixelated';
            
            console.log('Canvas created, testing 1px methods...');
            
            // Test different 1px drawing methods
            testOnePixelMethods();
        }

        function testOnePixelMethods() {
            let y = 50;
            
            // Method 1: strokeWeight(1) with line
            stroke(255, 0, 0); // Red
            strokeWeight(1);
            line(50, y, 200, y);
            fill(0);
            text('Method 1: strokeWeight(1) + line()', 220, y + 5);
            
            y += 50;
            
            // Method 2: 1x1 rect
            noStroke();
            fill(0, 255, 0); // Green
            for (let x = 50; x < 200; x++) {
                rect(x, y, 1, 1);
            }
            fill(0);
            text('Method 2: 1x1 rect() in loop', 220, y + 5);
            
            y += 50;
            
            // Method 3: point()
            stroke(0, 0, 255); // Blue
            strokeWeight(1);
            for (let x = 50; x < 200; x++) {
                point(x, y);
            }
            fill(0);
            text('Method 3: point() in loop', 220, y + 5);
            
            y += 50;
            
            // Method 4: set() pixel manipulation
            loadPixels();
            for (let x = 50; x < 200; x++) {
                set(x, y, color(255, 0, 255)); // Magenta
            }
            updatePixels();
            fill(0);
            text('Method 4: set() pixel manipulation', 220, y + 5);
            
            y += 50;
            
            // Method 5: Integer-positioned 1x1 rect
            noStroke();
            fill(255, 165, 0); // Orange
            for (let x = 50; x < 200; x++) {
                rect(Math.floor(x), Math.floor(y), 1, 1);
            }
            fill(0);
            text('Method 5: Math.floor() + 1x1 rect', 220, y + 5);
        }

        function draw() {
            // Interactive drawing test
            if (mouseIsPressed && mouseX > 50 && mouseX < 750 && mouseY > 350) {
                // Test current mouse position with 1px brush
                noStroke();
                fill(0);
                rect(Math.floor(mouseX), Math.floor(mouseY), 1, 1);
                
                console.log('Drawing 1px at:', Math.floor(mouseX), Math.floor(mouseY));
            }
        }
    </script>
</body>
</html>
