<!DOCTYPE html>
<html>
<head>
    <title>P5.js Pixel Perfect Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>
<body>
    <h1>P5.js Pixel Perfect Test</h1>
    <p>Click to toggle between smooth and noSmooth()</p>
    <p>Draw with mouse to see difference</p>
    <div id="canvas-container"></div>

    <script>
        let isPixelPerfect = false;
        let drawing = false;
        let lastX, lastY;

        function setup() {
            let canvas = createCanvas(800, 600);
            canvas.parent('canvas-container');
            
            // Force pixel density and initial settings
            pixelDensity(1);
            background(240);
            
            // Set initial smoothing
            if (isPixelPerfect) {
                noSmooth();
                console.log('STARTED with noSmooth()');
            } else {
                smooth();
                console.log('STARTED with smooth()');
            }
            
            // Also set canvas CSS
            updateCanvasCSS();
            
            // Instructions
            fill(0);
            textSize(16);
            text('Click to toggle pixel mode. Current: ' + (isPixelPerfect ? 'PIXEL PERFECT' : 'SMOOTH'), 10, 30);
        }

        function updateCanvasCSS() {
            let canvas = document.querySelector('canvas');
            if (canvas) {
                if (isPixelPerfect) {
                    canvas.style.imageRendering = 'pixelated';
                    console.log('CSS: pixelated');
                } else {
                    canvas.style.imageRendering = 'auto';
                    console.log('CSS: auto');
                }
            }
        }

        function draw() {
            // Only draw when mouse is pressed and moving
            if (drawing && mouseIsPressed) {
                // Set smoothing for this frame
                if (isPixelPerfect) {
                    noSmooth();
                } else {
                    smooth();
                }
                
                // Draw line
                stroke(0);
                strokeWeight(20); // Large brush to see smoothing difference
                line(lastX, lastY, mouseX, mouseY);
                
                console.log('Drew line from', lastX, lastY, 'to', mouseX, mouseY, 'pixel mode:', isPixelPerfect);
            }
            
            if (mouseIsPressed) {
                lastX = mouseX;
                lastY = mouseY;
            }
        }

        function mousePressed() {
            drawing = true;
            lastX = mouseX;
            lastY = mouseY;
            console.log('Started drawing at', mouseX, mouseY);
        }

        function mouseReleased() {
            drawing = false;
            console.log('Stopped drawing');
        }

        function mouseClicked() {
            // Toggle pixel perfect mode
            isPixelPerfect = !isPixelPerfect;
            console.log('Toggled to:', isPixelPerfect ? 'PIXEL PERFECT' : 'SMOOTH');
            
            // Update canvas CSS
            updateCanvasCSS();
            
            // Clear and redraw instructions
            background(240);
            fill(0);
            textSize(16);
            text('Click to toggle pixel mode. Current: ' + (isPixelPerfect ? 'PIXEL PERFECT' : 'SMOOTH'), 10, 30);
        }
    </script>
</body>
</html>
