<!DOCTYPE html>
<html>
<head>
    <title>Bresenham + Pixel Perfect Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>
<body>
    <h1>Bresenham + Pixel Perfect Algorithm Test</h1>
    <p>Click and drag to draw pixel-perfect lines</p>
    <p>Press SPACE to toggle pixel perfect filter</p>
    <div id="canvas-container"></div>

    <script>
        let pixelPerfectMode = true;
        let startX, startY;
        let drawing = false;

        // Bresenham's Line Algorithm
        function bresenhamLine(x0, y0, x1, y1) {
            const pixels = [];
            
            x0 = Math.round(x0);
            y0 = Math.round(y0);
            x1 = Math.round(x1);
            y1 = Math.round(y1);
            
            const dx = Math.abs(x1 - x0);
            const dy = Math.abs(y1 - y0);
            const sx = x0 < x1 ? 1 : -1;
            const sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;
            
            let currentX = x0;
            let currentY = y0;
            
            while (true) {
                pixels.push({ x: currentX, y: currentY });
                
                if (currentX === x1 && currentY === y1) break;
                
                const e2 = 2 * err;
                if (e2 > -dy) {
                    err -= dy;
                    currentX += sx;
                }
                if (e2 < dx) {
                    err += dx;
                    currentY += sy;
                }
            }
            
            return pixels;
        }

        // Pixel Perfect Filter (removes L-shapes)
        function pixelPerfectFilter(pixels) {
            if (pixels.length <= 2) return pixels;
            
            const filtered = [pixels[0]]; // Always keep first pixel
            
            for (let i = 1; i < pixels.length - 1; i++) {
                const prev = pixels[i - 1];
                const curr = pixels[i];
                const next = pixels[i + 1];
                
                // Check if current pixel forms an L-shape
                const isLShape = (
                    (prev.x !== next.x && prev.y !== next.y) && // Diagonal relationship
                    ((curr.x === prev.x && curr.y === next.y) || (curr.x === next.x && curr.y === prev.y))
                );
                
                if (!isLShape) {
                    filtered.push(curr);
                }
            }
            
            filtered.push(pixels[pixels.length - 1]); // Always keep last pixel
            return filtered;
        }

        function setup() {
            let canvas = createCanvas(800, 600);
            canvas.parent('canvas-container');
            
            pixelDensity(1);
            background(240);
            
            // Set pixel perfect canvas
            canvas.canvas.style.imageRendering = 'pixelated';
            
            drawInstructions();
        }

        function drawInstructions() {
            fill(0);
            textSize(16);
            text('Pixel Perfect Mode: ' + (pixelPerfectMode ? 'ON (filtered)' : 'OFF (raw Bresenham)'), 10, 30);
            text('Click and drag to draw lines', 10, 50);
        }

        function drawPixelLine(x1, y1, x2, y2, c) {
            // Get Bresenham pixels
            let pixels = bresenhamLine(x1, y1, x2, y2);
            
            // Apply filter if enabled
            if (pixelPerfectMode) {
                const originalCount = pixels.length;
                pixels = pixelPerfectFilter(pixels);
                console.log(`Filtered: ${originalCount} -> ${pixels.length} pixels`);
            }
            
            // Draw pixels
            loadPixels();
            pixels.forEach(pixel => {
                if (pixel.x >= 0 && pixel.x < width && pixel.y >= 0 && pixel.y < height) {
                    set(pixel.x, pixel.y, c);
                }
            });
            updatePixels();
            
            console.log(`Drew line: ${pixels.length} pixels from (${x1},${y1}) to (${x2},${y2})`);
        }

        function mousePressed() {
            if (mouseY > 70) { // Below instructions
                startX = mouseX;
                startY = mouseY;
                drawing = true;
            }
        }

        function mouseReleased() {
            if (drawing) {
                // Draw final line
                drawPixelLine(startX, startY, mouseX, mouseY, color(255, 0, 0));
                drawing = false;
            }
        }

        function keyPressed() {
            if (key === ' ') {
                pixelPerfectMode = !pixelPerfectMode;
                background(240);
                drawInstructions();
                console.log('Toggled pixel perfect mode:', pixelPerfectMode);
                return false;
            }
        }

        function draw() {
            // Show live preview while dragging
            if (drawing && mouseY > 70) {
                push();
                background(240);
                drawInstructions();
                
                // Draw preview line
                stroke(0, 0, 255, 150);
                strokeWeight(1);
                line(startX, startY, mouseX, mouseY);
                
                pop();
            }
        }
    </script>
</body>
</html>
